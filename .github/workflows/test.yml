name: CHANGELOG
run-name: Update Changelog

on:
  push:
    tags:
      - "v*"

jobs:
  store_history:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: "main"
      - name: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
      - name: run_script
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }} # Pasando tag al script
          GITHUB_REPOSITORY: ${{ github.repository }} # Pasando nombre del repo al script
        run: node script.js # Correr script  encargado de llenar CHANGELO.md
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: Update CHANGELOG.md for ${{ github.ref_name }}" -m "ci-skip: true"
          git push origin main
